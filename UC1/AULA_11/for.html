<script>
    //for é uma estrutura de repetição muito usada quando sabemos quantas vezes queremos repetir uma tarefa
   let contador = 0;

   for (contador; contador <=5; contador++){

    console.log(`${contador}.DADOS DE REPETIÇÃO`)
   }
  //let contador = 1 -- cria o contador começando em 1
  //contador < = 5 -- define até quando o laço vai repetir
  //contador ++ -- aumenta o contador de 1 em 1

  //CONTAGEM Descrescente
  console.log(`
  EXIBINDO NÚMEROS DESCRECENTE
  `)
  let cont = 5
  for (cont; cont >= 1; cont--){
    console.log(`${cont} - Dados de repetição`);
  }

  //CONTAGEM EM PARES
  console.log(`
  EXIBINDO NÚMEROS PARES
  `)

  cont = 2
  for(cont; cont <= 20; cont += 2){
    console.log(`${cont} - Dados de repetição`);
  }

  //CONTAGEM EM IMPARES
  console.log(`
  EXBINDO NÚMEROS EM IMPARES
  `)
  cont = 3
  for(cont; cont <=12; cont == 3){
    console.log(`${cont} - Dados de repetição`);
}

</script>
