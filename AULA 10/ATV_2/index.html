<script>
    let média = Number(prompt("Digite sua nota"));
        while (média !== 0){
            if (média >= 0 || média <= 10){
             if ( média >= 7){
                alert ("Aprovado")
            } else if ( média >= 5){
                alert ("Recuperação")
            } else { 
                alert ( "Reprovado")
            }
            }else {
                alert ("Erro")
            }
        média = Number(prompt("Digite sua nota"));
        }
</script>
